<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 420px;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 16px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #0f3460;
  }
  fieldset {
    border: 1px solid #0f3460;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
  }
  legend {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8892b0;
    padding: 0 6px;
  }
  label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
    font-size: 12px;
  }
  label span {
    color: #a0a0b0;
  }
  input, select {
    width: 160px;
    padding: 5px 8px;
    background: #16213e;
    color: #e0e0e0;
    border: 1px solid #0f3460;
    border-radius: 4px;
    font: inherit;
    font-size: 12px;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #e94560;
  }
  .row {
    display: flex;
    gap: 10px;
    margin: 6px 0;
  }
  .row label {
    flex: 1;
    margin: 0;
  }
  .row input, .row select {
    width: 100%;
  }
  .compact-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin: 6px 0;
  }
  .compact-row label {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    margin: 0;
  }
  .compact-row input, .compact-row select {
    width: 100%;
  }
  optgroup {
    font-style: normal;
    font-weight: 600;
    color: #8892b0;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 4px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover:not(:disabled) {
    opacity: 0.9;
  }
  #btn-start { background: #e94560; color: #fff; }
  #btn-start:disabled { background: #333; color: #666; cursor: default; }
  #btn-stop { background: #533483; color: #fff; display: none; }
  #status {
    margin-top: 12px;
    padding: 8px 10px;
    background: #16213e;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    min-height: 2.4em;
    white-space: pre-wrap;
    color: #8892b0;
  }
  input:disabled, select:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .quality-slider {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .quality-slider input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: #0f3460;
    border-radius: 3px;
    border: none;
    padding: 0;
  }
  .quality-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #e94560;
    border-radius: 50%;
    cursor: pointer;
  }
  .quality-slider input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #e94560;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .quality-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #6a7085;
    padding: 0 2px;
  }
  .quality-labels span {
    text-align: center;
    flex: 1;
  }

</style>
</head>
<body>
  <h1>🎬 Perfect Canvas</h1>

  <fieldset>
    <legend>Dimensions</legend>
    <label>
      <span>Size Preset</span>
      <select id="size-preset">
        <option value="native">Native (match canvas)</option>
        <optgroup label="Landscape (16:9)">
          <option value="1280x720">1280 × 720 (720p)</option>
          <option value="1920x1080">1920 × 1080 (1080p)</option>
          <option value="2560x1440">2560 × 1440 (1440p)</option>
          <option value="3840x2160">3840 × 2160 (4K)</option>
        </optgroup>
        <optgroup label="Portrait (9:16)">
          <option value="720x1280">720 × 1280</option>
          <option value="1080x1920">1080 × 1920</option>
          <option value="1440x2560">1440 × 2560</option>
          <option value="2160x3840">2160 × 3840 (4K)</option>
        </optgroup>
        <optgroup label="Square">
          <option value="1080x1080">1080 × 1080</option>
          <option value="1440x1440">1440 × 1440</option>
        </optgroup>
        <option value="custom">Custom...</option>
      </select>
    </label>
    <div class="row">
      <label><span>Width</span> <input id="width" type="number" value="" disabled></label>
      <label><span>Height</span> <input id="height" type="number" value="" disabled></label>
    </div>
    <label>
      <span>Upscale to</span>
      <select id="upscale">
        <option value="none">None</option>
        <optgroup label="Landscape (16:9)">
          <option value="1280x720">1280 × 720 (720p)</option>
          <option value="1920x1080">1920 × 1080 (1080p)</option>
          <option value="2560x1440">2560 × 1440 (1440p)</option>
          <option value="3840x2160">3840 × 2160 (4K)</option>
        </optgroup>
        <optgroup label="Portrait (9:16)">
          <option value="720x1280">720 × 1280</option>
          <option value="1080x1920">1080 × 1920</option>
          <option value="1440x2560">1440 × 2560</option>
          <option value="2160x3840">2160 × 3840 (4K)</option>
        </optgroup>
        <optgroup label="Square">
          <option value="1080x1080">1080 × 1080</option>
          <option value="1440x1440">1440 × 1440</option>
        </optgroup>
      </select>
    </label>
  </fieldset>

  <fieldset>
    <legend>Recording</legend>
    <div class="row">
      <label><span>FPS</span> <input id="fps" type="number" value="60"></label>
      <label><span>Duration (s)</span> <input id="duration" type="number" value="10" title="0 = manual stop"></label>
    </div>
    <label>
      <span>Quality</span>
      <div class="quality-slider">
        <input type="range" id="quality" min="0" max="4" value="2">
        <div class="quality-labels">
          <span>Draft</span>
          <span>Good</span>
          <span>High</span>
          <span>Ultra</span>
          <span>Lossless</span>
        </div>
      </div>
    </label>
    <label>
      <span>Speed</span>
      <div class="quality-slider">
        <input type="range" id="speed" min="0" max="4" value="1">
        <div class="quality-labels">
          <span>Ultra</span>
          <span>Very</span>
          <span>Fast</span>
          <span>Medium</span>
          <span>Slow</span>
        </div>
      </div>
    </label>
    <label>
      <span>Codec</span>
      <select id="codec">
        <option value="libx264">libx264 (CPU)</option>
        <option value="h264_vaapi">h264_vaapi (GPU, AMD/Intel)</option>
      </select>
    </label>
    <label>
      <span>Profile</span>
      <input type="checkbox" id="profile" style="width: auto;">
    </label>
  </fieldset>

  <fieldset>
    <legend>Output</legend>
    <label>
      <span>File Path</span>
      <input id="output" type="text" value="~/Videos/capture.mp4" style="width: 220px;">
    </label>
  </fieldset>

  <button id="btn-start">▶ Start Capture</button>
  <button id="btn-stop">⬛ Stop Capture</button>
  <div id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
